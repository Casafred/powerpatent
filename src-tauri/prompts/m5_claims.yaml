id: m5_claims
name: 权利要求范围解读
description: 解读独立权利要求和从属权利要求的保护范围
model_hint: strong
temperature: 0.2
input_fields:
  - claims_text
  - description_text
output_schema:
  type: object
  properties:
    independent_claims:
      type: array
      items:
        type: object
        properties:
          claim_number:
            type: integer
          claim_text:
            type: string
          core_features:
            type: array
            items:
              type: string
          scope_summary:
            type: string
    dependent_claims:
      type: array
      items:
        type: object
        properties:
          claim_number:
            type: integer
          depends_on:
            type: integer
          additional_limitation:
            type: string
          scope_narrowing:
            type: string
prompt_template: |
  你是一位资深专利分析师。请解读以下权利要求，分析其保护范围。

  ## 权利要求书

  {{claims_text}}

  ## 说明书（参考）

  {{description_text}}

  ## 输出要求

  请严格按以下 JSON 格式输出：

  ```json
  {
    "independent_claims": [
      {
        "claim_number": 1,
        "claim_text": "独立权利要求原文",
        "core_features": ["必要技术特征1", "必要技术特征2"],
        "scope_summary": "该独立权利要求的保护范围概述"
      }
    ],
    "dependent_claims": [
      {
        "claim_number": 2,
        "depends_on": 1,
        "additional_limitation": "附加技术特征描述",
        "scope_narrowing": "该从属权利要求对保护范围的进一步限定"
      }
    ]
  }
  ```
