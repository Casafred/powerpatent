id: m5_claims
name: 权利要求范围解读
description: 解读独立权利要求和从属权利要求的保护范围
model_hint: strong
temperature: 0.2
input_fields:
  - claims_text
  - description_text
output_schema:
  type: object
  properties:
    independent_claims:
      type: array
      items:
        type: object
        properties:
          claim_number:
            type: integer
          claim_text:
            type: string
          claim_text_original:
            type: string
          core_features:
            type: array
            items:
              type: string
          scope_summary:
            type: string
    dependent_claims:
      type: array
      items:
        type: object
        properties:
          claim_number:
            type: integer
          depends_on:
            type: integer
          additional_limitation:
            type: string
          additional_limitation_original:
            type: string
          scope_narrowing:
            type: string
prompt_template: |
  你是一位资深专利分析师。请解读以下权利要求，分析其保护范围。

  ## 权利要求书

  {{claims_text}}

  ## 说明书（参考）

  {{description_text}}

  ## 输出要求

  请严格按以下 JSON 格式输出。

  **重要：所有分析解读内容必须以中文输出。如果权利要求原文为外文，请在 claim_text / additional_limitation 字段提供中文翻译，同时在 claim_text_original / additional_limitation_original 字段保留原文。如果原文为中文，则 _original 字段与对应字段内容相同。**

  ```json
  {
    "independent_claims": [
      {
        "claim_number": 1,
        "claim_text": "独立权利要求中文翻译",
        "claim_text_original": "独立权利要求原文",
        "core_features": ["必要技术特征1", "必要技术特征2"],
        "scope_summary": "该独立权利要求的保护范围概述（中文）"
      }
    ],
    "dependent_claims": [
      {
        "claim_number": 2,
        "depends_on": 1,
        "additional_limitation": "附加技术特征中文翻译",
        "additional_limitation_original": "附加技术特征原文",
        "scope_narrowing": "该从属权利要求对保护范围的进一步限定（中文）"
      }
    ]
  }
  ```
