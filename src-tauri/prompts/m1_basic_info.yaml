id: m1_basic_info
name: 专利基本信息
description: 从专利全文中抽取基本著录信息
model_hint: fast
temperature: 0.1
input_fields:
  - full_text
output_schema:
  type: object
  properties:
    publication_number:
      type: string
    application_number:
      type: string
    applicant:
      type: string
    inventor:
      type: string
    title:
      type: string
    filing_date:
      type: string
    publication_date:
      type: string
    ipc:
      type: string
    cpc:
      type: string
    abstract_text:
      type: string
prompt_template: |
  你是一位专业的专利信息抽取专家。请从以下专利全文中抽取基本著录信息。

  ## 专利全文

  {{full_text}}

  ## 输出要求

  请严格按以下 JSON 格式输出，不要输出任何其他内容。如果某字段无法从文本中识别，请填空字符串：

  ```json
  {
    "publication_number": "公开号/专利号",
    "application_number": "申请号",
    "applicant": "申请人",
    "inventor": "发明人",
    "title": "发明名称",
    "filing_date": "申请日期（YYYY-MM-DD格式）",
    "publication_date": "公开/授权日期（YYYY-MM-DD格式）",
    "ipc": "IPC分类号",
    "cpc": "CPC分类号（如有）",
    "abstract_text": "摘要内容"
  }
  ```
